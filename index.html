<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BirTI 灰域边缘的诞辰漫游</title>
  <meta name="description" content="一场灰域边缘的诞辰漫游。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>" />
  <script type="module" crossorigin src="/BirTI/assets/index-DsyrLmhC.js"></script>
  <link rel="stylesheet" crossorigin href="/BirTI/assets/index-DfyGxnL_.css">
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title">灰域边缘的诞辰漫游<br/>BirTI</h1>
        <p class="intro-subtitle">略有伤感，但无伤大雅。</p>
        <button id="btn-start" class="btn btn-primary">开始漫游</button>
        <p class="intro-note">本测试仅供娱乐，说不准平行世界里会有这样一天。</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 21</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker" id="result-kicker">你的最终结局</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        
        <!-- 结局图片占位符 -->
        <img id="result-image" src="" alt="结局意象" style="display:none; width:100%; border-radius:8px; margin-top:16px; margin-bottom:16px; border: 1px solid #333;" />

        <div class="result-intro" id="result-intro" style="font-style: italic; color: #aaa; margin-bottom: 12px;"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">精神漫游六轴</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">其他可能结局</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新漫游</button>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
